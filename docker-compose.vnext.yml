services:
  gateway-vnext:
    build:
      context: ./vnext
      dockerfile: Dockerfile
    container_name: copilot-gateway-vnext
    ports:
      - "${VNEXT_PORT:-41415}:41415"
    environment:
      - PORT=41415
      - ACCOUNT_TYPE=${ACCOUNT_TYPE:-individual}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
      # Dev-only: bypasses dashboard OAuth so smoke tests can hit /v1/* directly.
      # Set ONE of these in .env (or shell) — leave both unset for prod-like runs.
      - VNEXT_DEV_GITHUB_TOKEN=${VNEXT_DEV_GITHUB_TOKEN:-}
      - VNEXT_DEV_COPILOT_TOKEN=${VNEXT_DEV_COPILOT_TOKEN:-}
      - VNEXT_DEV_USER_ID=${VNEXT_DEV_USER_ID:-dev-user}
    volumes:
      # Persist vnext sqlite separately from the prod gateway's .data dir.
      - ./data-vnext:/data
    restart: unless-stopped
