services:
  gateway:
    build: .
    ports:
      - "${PORT:-41414}:41414"
    environment:
      - PORT=41414
      - ACCOUNT_TYPE=${ACCOUNT_TYPE:-individual}
      - ADMIN_KEY=${ADMIN_KEY:-xuangong123!}
      - LANGSEARCH_API_KEY=${LANGSEARCH_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      # Persist data between restarts
      - ./data:/app/.data
    restart: unless-stopped
